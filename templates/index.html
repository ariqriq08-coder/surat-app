<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff758c;
            --secondary-color: #ff5e78;
            --bg-gradient: linear-gradient(135deg, #fceabb 0%, #f8b500 0%, #f78181 100%);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Container Utama */
        .wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Amplop */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background: white;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.4s;
        }

        .envelope-wrapper:hover {
            transform: translateY(-10px);
        }

        .envelope-wrapper::before {
            content: "";
            position: absolute;
            z-index: 2;
            border-top: 100px solid transparent;
            border-right: 150px solid #ff8fa3;
            border-bottom: 100px solid #ff8fa3;
            border-left: 150px solid #ff758c;
            border-radius: 0 0 10px 10px;
        }

        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--primary-color);
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 3;
        }

        /* Surat di Dalam */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 90%;
            background: #fffdf5;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: 0.6s;
            z-index: 1;
            border: 2px solid #fceabb;
            border-radius: 5px;
        }

        .letter-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            color: #444;
            text-align: center;
            margin: 0;
            line-height: 1.4;
        }

        /* Animasi Buka */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            transform: translate(-50%, -150px);
            height: 250px;
            z-index: 4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Partikel Hati */
        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff4b2b;
            user-select: none;
            pointer-events: none;
            animation: fly 3s linear forwards;
            z-index: 5;
            opacity: 0;
        }

        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-300px) rotate(360deg); opacity: 0; }
        }

        /* Tulisan Petunjuk */
        .hint {
            position: absolute;
            bottom: -50px;
            color: white;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="envelope-wrapper" onclick="openLetter(this)">
            <div class="flap"></div>
            <div class="letter">
                <p class="letter-text" id="text"></p>
            </div>
            <div class="hint">Klik untuk Membuka ❤️</div>
        </div>
    </div>

    <script>
        const message = "Untuk Mazuu sayang... Kamu tau nggak? Setiap kali aku lihat namamu, hatiku rasanya kayak lagi denger lagu favorit. Makasih ya sudah sabar dan selalu ada. Aku sayang kamu lebih dari yang bisa dijelaskan oleh ribuan kode Python ini. Tetap di sini ya? ❤️";
        
        let i = 0;
        let isOpened = false;

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "%";
            heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
            
            const wrapper = document.querySelector(".wrapper");
            wrapper.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 3000);
        }

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        function openLetter(el) {
            if (isOpened) return; // Mencegah klik ganda
            
            isOpened = true;
            el.classList.add("open");
            document.querySelector(".hint").style.display = "none";

            // Munculkan banyak hati
            for(let h=0; h<15; h++) {
                setTimeout(createHeart, h * 100);
            }

            // Mulai ngetik setelah surat naik
            setTimeout(typeWriter, 800);
        }
    </script>
</body>
</html>
