<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="flowers"></div>
    
    <div class="container">
        <div class="envelope" id="envelope" onclick="openLetter()">
            <div class="flap"></div>
            <div class="letter">
                <p id="text"></p>
            </div>
        </div>
    </div>

    <script>
        // Pesan teks tanpa animasi hati
        const message = "Untuk Mazuu... Sebenarnya surat ini cuma cara kecilku untuk bilang kalau kehadiranmu itu seperti pelangi setelah hujan; menenangkan dan selalu indah. Terima kasih sudah menjadi bagian dari hariku. Aku sayang kamu lebih dari yang bisa kutuliskan di sini.";
        
        let i = 0;
        let isOpened = false;

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 50); 
            }
        }

        function openLetter() {
            if (isOpened) return;
            isOpened = true;

            // Membuka amplop (mengaktifkan class .open di style.css kamu)
            const envelope = document.getElementById("envelope");
            envelope.classList.add("open");

            // Mulai ngetik setelah flap terbuka
            setTimeout(typeWriter, 800);
        }
    </script>

</body>
</html>
