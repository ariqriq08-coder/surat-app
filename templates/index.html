<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Menggunakan Background Gradasi dari kode sebelumnya */
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }

        /* Amplop dengan sentuhan Glassmorphism sedikit transparan */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background: rgba(255, 255, 255, 0.2); /* Transparan */
            backdrop-filter: blur(5px);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .envelope-wrapper:hover {
            transform: translateY(-10px) scale(1.02);
        }

        /* Bagian Badan Amplop */
        .envelope-wrapper::before {
            content: "";
            position: absolute;
            z-index: 2;
            border-top: 100px solid transparent;
            border-right: 150px solid #ff8fa3;
            border-bottom: 100px solid #ff8fa3;
            border-left: 150px solid #ff758c;
            border-radius: 0 0 10px 10px;
        }

        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid #ff758c;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 3;
        }

        /* Surat di Dalam */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 80%;
            background: #fffdf5;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: 0.6s;
            z-index: 1;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .letter-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            color: #444;
            text-align: center;
            margin: 0;
            line-height: 1.5;
        }

        /* Efek saat amplop Terbuka */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            transform: translate(-50%, -160px); /* Surat naik ke atas */
            height: 250px;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: rgba(255, 255, 255, 0.95);
        }

        /* Partikel Hati */
        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff4b2b;
            user-select: none;
            pointer-events: none;
            animation: fly 3s linear forwards;
            z-index: 10;
        }

        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-400px) rotate(360deg); opacity: 0; }
        }

        .hint {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="envelope-wrapper" id="envelope" onclick="openLetter()">
            <div class="flap"></div>
            <div class="letter">
                <p class="letter-text" id="text"></p>
            </div>
            <div class="hint">Klik Amplop untuk Membuka ❤️</div>
        </div>
    </div>

    <script>
        // Masukkan kata-kata favoritmu di sini
        const message = "Untuk Mazuu... Sebenarnya surat ini cuma cara kecilku untuk bilang kalau kehadiranmu itu seperti pelangi setelah hujan; menenangkan dan selalu indah. Terima kasih sudah menjadi bagian dari hariku. Aku sayang kamu lebih dari yang bisa kutuliskan di sini. ❤️";
        
        let i = 0;
        let isOpened = false;

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = (Math.random() * 80 + 10) + "%"; // Agar tetap di tengah
            heart.style.top = "50%";
            heart.style.animationDuration = (Math.random() * 2 + 1) + "s";
            
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 3000);
        }

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        function openLetter() {
            if (isOpened) return;
            
            isOpened = true;
            const env = document.getElementById("envelope");
            env.classList.add("open");
            document.querySelector(".hint").style.opacity = "0";

            // Ledakan hati
            for(let h=0; h<20; h++) {
                setTimeout(createHeart, h * 150);
            }

            // Mulai mengetik
            setTimeout(typeWriter, 1000);
        }
    </script>
</body>
</html>
