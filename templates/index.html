<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="flowers"></div>
    
    <div class="container">
        <div class="envelope" id="envelope" onclick="openLetter()">
            <div class="flap"></div>
            <div class="letter">
                <p id="text"></p>
            </div>
        </div>
    </div>

    <script>
        // Pesan teks tanpa animasi hati
        const message = "untuk mazu… ahahaha congratulations ya atas semhasnya habis semhas ada ujian lagikan, semangat ya ga lama lagi udah sah gelar Amd.Keb nya tu ahaha. Gatau mau bilang apalagi selain ucapan selamat. Emm oiya ariq gatau mau kasi hadiah apa ke mazu, soalnya bingung juga gatau mazu sukanya apa jadi ariq kasih doa yang terbaik aja yaa hehhee, tapi kalo mazu pengen hadiah bilang aja nanti dicari Insya Allah. Kalo ariq kasih bunga nanti pasti org lain kasih juga, kalo kasih kue juga pasti ada org lain jga yg udah kasih bingung jadinya. Maaf yaa, emm sekali lagi selamat ya mazu mudah mudahan nanti bisa jadi bidan yang Amanah,baik dan juga ramah yaa. Siippp selamat mazuu.";
        
        let i = 0;
        let isOpened = false;

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 50); 
            }
        }

        function openLetter() {
            if (isOpened) return;
            isOpened = true;

            // Membuka amplop (mengaktifkan class .open di style.css kamu)
            const envelope = document.getElementById("envelope");
            envelope.classList.add("open");

            // Mulai ngetik setelah flap terbuka
            setTimeout(typeWriter, 800);
        }
    </script>

</body>
</html>
