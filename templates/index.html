<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Tambahkan CSS dasar di sini jika style.css belum ada */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 300px;
            height: 200px;
        }

        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ff758c;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            transition: transform 0.8s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .envelope:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* Bagian Depan Amplop (Segitiga Bawah) */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid #ff5e78;
            border-radius: 0 0 10px 10px;
            z-index: 4;
        }

        /* Sisi Kiri & Kanan Amplop (Segitiga Samping) */
        .envelope::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #ff6781;
            border-right: 150px solid transparent;
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
            z-index: 3;
        }

        /* Penutup Amplop (Flap Atas) */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #ff758c; /* Warna penutup sama dengan badan */
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 5;
        }

        /* Surat di Dalam */
        .letter {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 5px;
            transition: transform 0.8s ease-in-out;
            z-index: 1; /* Awalnya di bawah amplop */
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #text {
            color: #333;
            font-size: 0.9rem;
            line-height: 1.5;
            text-align: center;
            margin: 0;
        }

        /* Kelas untuk membuka amplop */
        .envelope.open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Saat terbuka, penutup jadi di belakang */
        }

        .envelope.open .letter {
            transform: translateY(-130px); /* Geser surat ke atas */
            z-index: 6; /* Surat jadi di paling depan */
        }
    </style>
</head>
<body>

    <div class="flowers"></div>
    <div class="container">
        <div class="envelope" onclick="openLetter()">
            <div class="flap"></div>
            <div class="letter">
                <p id="text"></p>
            </div>
        </div>
    </div>

    <script>
        // Tentukan kata-kata cintamu langsung di sini!
        const textToType = "Untuk Mazuu... Sebenarnya surat ini cuma cara kecilku untuk bilang kalau kehadiranmu itu seperti pelangi setelah hujan; menenangkan dan selalu indah. Terima kasih sudah menjadi bagian dari hariku. Aku sayang kamu lebih dari yang bisa kutuliskan di sini. ❤";

        let i = 0;

        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("text").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 40); // Kecepatan mengetik (semakin kecil semakin cepat)
            }
        }

        function openLetter() {
            // Tambahkan kelas .open agar CSS menggerakkan amplop dan surat
            document.querySelector(".envelope").classList.add("open");
            
            // Tunggu sedikit (setengah detik) sampai amplop terbuka, baru mulai mengetik
            setTimeout(typeWriter, 500);
        }
    </script>

</body>
</html>
