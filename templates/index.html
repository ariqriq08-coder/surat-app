<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Mazuu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Tambahan sedikit untuk efek hati agar tidak merusak style.css asli */
        .heart {
            position: absolute;
            font-size: 25px;
            color: #ff4b2b;
            user-select: none;
            pointer-events: none;
            animation: fly 3s linear forwards;
            z-index: 9999;
        }
        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-500px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

<body>

    <div class="flowers"></div>
    
    <div class="container">
        <div class="envelope" onclick="openLetter()">
            <div class="flap"></div>
            <div class="letter">
                <p id="text"></p>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN KATA-KATA CINTAMU DI SINI
        const message = "Untuk Mazuu... Sebenarnya surat ini cuma cara kecilku untuk bilang kalau kehadiranmu itu seperti pelangi setelah hujan; menenangkan dan selalu indah. Terima kasih sudah menjadi bagian dari hariku. Aku sayang kamu lebih dari yang bisa kutuliskan di sini. ❤️";
        
        let i = 0;
        let isOpened = false;

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.top = "80vh";
            heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 3000);
        }

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 40); 
            }
        }

        function openLetter() {
            if (isOpened) return;
            isOpened = true;

            // Jalankan animasi buka dari style.css kamu
            document.querySelector(".envelope").classList.add("open");

            // Munculkan efek hati terbang
            for(let h=0; h<25; h++) {
                setTimeout(createHeart, h * 100);
            }

            // Mulai efek mengetik setelah amplop terbuka
            setTimeout(typeWriter, 800);
        }
    </script>

</body>
</html>
